name: Vibe Review

on:
  pull_request:
    branches: ['main']
    types: [opened, synchronize, reopened]

permissions:
  issues: write
  pull-requests: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Vibe Reviewer
        uses: duranbe/vibe-reviewer@v1.0.0
        id: vibe-review
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


name: Vibe Review

on:
  pull_request:
    branches: ['main']
    types: [opened, synchronize, reopened]

permissions:
  issues: write
  pull-requests: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Vibe Reviewer
        uses: duranbe/vibe-reviewer@v0.0.10
        id: vibe-review

      - name: Show Results
        run: |
          echo "🎯 Vibe Review Results:"
          echo "Risk Level: ${{ steps.vibe-review.outputs.risk-level }}"
          echo "Files Changed: ${{ steps.vibe-review.outputs.files-changed }}"
          echo "Has Tests: ${{ steps.vibe-review.outputs.has-tests }}"
          echo "Total Additions: ${{ steps.vibe-review.outputs.total-additions }}"
          echo "Total Deletions: ${{ steps.vibe-review.outputs.total-deletions }}"

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const riskLevel = "${{ steps.vibe-review.outputs.risk-level }}";
            const filesChanged = "${{ steps.vibe-review.outputs.files-changed }}";
            const totalAdditions = "${{ steps.vibe-review.outputs.total-additions }}";
            const totalDeletions = "${{ steps.vibe-review.outputs.total-deletions }}";
            const hasTests = "${{ steps.vibe-review.outputs.has-tests }}";
            
            const commentBody = "🎯 Vibe Review: **" + riskLevel + "** risk\n\n" +
                "- Files changed: " + filesChanged + "\n" +
                "- Lines added: " + totalAdditions + "\n" +
                "- Lines deleted: " + totalDeletions + "\n" +
                "- Tests included: " + hasTests;
            
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            
            const botComment = comments.find(c => c.user.login === 'github-actions[bot]' && c.body.includes('🎯 Vibe Review'));
            
            if (botComment) {
              await github.rest.issues.updateComment({
                comment_id: botComment.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: commentBody
              });
            }
